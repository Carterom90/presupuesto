<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mi Presupuesto</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Balance">
  <meta name="theme-color" content="#0f0f11">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f11;--sur:#18181c;--sur2:#222228;--bd:rgba(255,255,255,0.07);--bd2:rgba(255,255,255,0.13);--tx:#f0eff0;--tx2:#888890;--tx3:#555560;--green:#1fcc8a;--red:#ff6b6b;--rd:rgba(255,107,107,0.12);--ac:#7c6fff;--am:#f5a623;--r:16px;--rs:10px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;font-size:15px;overscroll-behavior:none}
body{display:flex;flex-direction:column;max-width:430px;margin:0 auto}

/* LOGIN */
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:32px;gap:24px}
.login-logo{font-size:48px;margin-bottom:8px}
.login-title{font-size:24px;font-weight:500;text-align:center}
.login-sub{font-size:14px;color:var(--tx2);text-align:center}
.login-form{width:100%;display:flex;flex-direction:column;gap:12px}
.login-input{width:100%;background:var(--sur);border:0.5px solid var(--bd2);border-radius:var(--rs);padding:14px 16px;font-size:15px;color:var(--tx);font-family:'DM Sans',sans-serif;outline:none;-webkit-appearance:none}
.login-input:focus{border-color:var(--ac)}
.login-btn{width:100%;background:var(--ac);border:none;border-radius:var(--rs);padding:15px;font-size:15px;color:white;cursor:pointer;font-weight:500;font-family:'DM Sans',sans-serif;margin-top:4px}
.login-btn:active{opacity:.85}
.login-error{font-size:13px;color:var(--red);text-align:center;min-height:18px;background:var(--rd);border-radius:8px;padding:10px;display:none}
.login-error.show{display:block}

/* APP */
.app-screen{display:none;flex-direction:column;height:100%;overflow:hidden}
.app-screen.visible{display:flex}
.header{padding:52px 20px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg);z-index:10}
.mnav{display:flex;align-items:center;gap:12px}
.mnbtn{width:34px;height:34px;border-radius:50%;border:0.5px solid var(--bd2);background:var(--sur);color:var(--tx2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.mnbtn:active{transform:scale(.94)}
.mlbl{font-size:17px;font-weight:500;min-width:120px;text-align:center}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--tx3);flex-shrink:0;transition:background .3s}
.sync-dot.ok{background:var(--green)}.sync-dot.syncing{background:var(--am);animation:blink 1s infinite}.sync-dot.error{background:var(--red)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.content{flex:1;overflow-y:auto;padding:0 16px 24px;-webkit-overflow-scrolling:touch}
.hero{text-align:center;padding:20px 0 24px}
.hero-lbl{font-size:12px;color:var(--tx3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.hero-bal{font-size:42px;font-weight:300;letter-spacing:-1.5px;font-family:'DM Mono',monospace}
.hero-bal.pos{color:var(--green)}.hero-bal.neg{color:var(--red)}
.hero-sub{font-size:13px;color:var(--tx2);margin-top:4px}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.sc{background:var(--sur);border:0.5px solid var(--bd);border-radius:var(--rs);padding:14px 16px}
.sc-l{font-size:11px;color:var(--tx3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.sc-v{font-size:20px;font-weight:500;font-family:'DM Mono',monospace}
.sc-v.inc{color:var(--green)}.sc-v.exp{color:var(--red)}
.alert-banner{display:none;margin:0 0 16px;border-radius:var(--rs);padding:14px 16px;border:0.5px solid;animation:slideIn .3s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.alert-banner.warn{display:flex;background:rgba(245,166,35,0.1);border-color:rgba(245,166,35,0.3);color:var(--am)}
.alert-banner.crit{display:flex;background:rgba(255,107,107,0.1);border-color:rgba(255,107,107,0.35);color:var(--red)}
.alert-icon{font-size:20px;margin-right:12px;flex-shrink:0}
.alert-title{font-size:13px;font-weight:600;margin-bottom:2px}
.alert-sub{font-size:12px;opacity:.85}
.meta-card{background:var(--sur);border:0.5px solid var(--bd);border-radius:var(--r);padding:18px 18px 16px;margin-bottom:20px}
.meta-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.meta-label{font-size:11px;color:var(--tx3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
.meta-title{font-size:16px;font-weight:500}
.meta-badge{font-size:11px;font-weight:500;background:rgba(124,111,255,0.18);color:#a89fff;border-radius:20px;padding:4px 10px}
.meta-badge.done{background:rgba(31,204,138,0.18);color:var(--green)}
.meta-big{font-size:28px;font-weight:300;font-family:'DM Mono',monospace;color:var(--ac);letter-spacing:-1px}
.meta-big span{font-size:14px;color:var(--tx3);font-family:'DM Sans',sans-serif;font-weight:400}
.pbar-wrap{height:8px;background:var(--bd);border-radius:4px;overflow:hidden;margin-bottom:8px}
.pbar-fill{height:8px;border-radius:4px;background:linear-gradient(90deg,var(--ac),var(--green));transition:width .5s ease}
.months-row{display:grid;grid-template-columns:repeat(12,1fr);gap:3px;margin-bottom:12px}
.mstep{height:24px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:500}
.mstep.done{background:var(--green);color:#04342C}.mstep.current{background:var(--ac);color:white}
.mstep.future{background:var(--bd);color:var(--tx3)}.mstep.missed{background:rgba(255,107,107,0.25);color:var(--red)}
.meta-month-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0 0;border-top:0.5px solid var(--bd)}
.meta-saved-btn{font-size:12px;font-weight:500;padding:7px 14px;border-radius:20px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif}
.meta-saved-btn.pending{background:rgba(124,111,255,0.18);color:#a89fff}
.meta-saved-btn.done{background:rgba(31,204,138,0.15);color:var(--green)}
.sr{display:flex;align-items:center;justify-content:space-between;margin:0 0 10px}
.sl{font-size:11px;font-weight:500;color:var(--tx3);text-transform:uppercase;letter-spacing:.08em}
.irow{background:var(--sur);border:0.5px solid var(--bd);border-left:3px solid var(--green);border-radius:var(--rs);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;cursor:pointer}
.irow:active{background:var(--sur2)}
.i-name{font-size:14px;font-weight:500}.i-sub{font-size:12px;color:var(--tx3)}
.i-amt{font-family:'DM Mono',monospace;font-size:16px;color:var(--green)}
.cats{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.cat{background:var(--sur);border:0.5px solid var(--bd);border-radius:var(--rs);padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer}
.cat:active{background:var(--sur2)}.cat.otros{border-style:dashed}
.cat.expanded{border-radius:var(--rs) var(--rs) 0 0;border-bottom-color:transparent}
.cdot{width:36px;height:36px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:17px}
.cmeta{flex:1;min-width:0}
.cname{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cbar{margin-top:5px;height:3px;background:var(--bd);border-radius:2px;overflow:hidden}
.cbarfi{height:3px;border-radius:2px}
.cright{text-align:right;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.camt{font-family:'DM Mono',monospace;font-size:15px;font-weight:500}
.cpct{font-size:11px;color:var(--tx3)}
.cchev{font-size:12px;color:var(--tx3);transition:transform .2s}
.cchev.open{transform:rotate(180deg)}
.otbadge{font-size:10px;background:rgba(245,166,35,0.15);color:var(--am);border-radius:4px;padding:1px 5px;margin-left:6px;vertical-align:middle}
.exp-panel{background:var(--sur2);border:0.5px solid var(--bd);border-top:none;border-radius:0 0 var(--rs) var(--rs);overflow:hidden;max-height:0;transition:max-height .3s ease}
.exp-panel.open{max-height:600px}
.exp-panel-inner{padding:0 14px 10px}
.exp-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:0.5px solid var(--bd)}
.exp-row:last-child{border-bottom:none}
.exp-left{flex:1;min-width:0}
.exp-desc{font-size:13px;color:var(--tx);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.exp-meta{font-size:11px;color:var(--tx3);margin-top:2px;display:flex;align-items:center;gap:6px}
.exp-who{color:var(--tx2)}
.exp-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.exp-amt{font-family:'DM Mono',monospace;font-size:13px;font-weight:500}
.exp-del{width:26px;height:26px;border-radius:6px;border:none;background:transparent;color:var(--tx3);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.exp-del:active{background:var(--rd);color:var(--red)}
.exp-add-row{padding:10px 0 2px;display:flex;gap:8px}
.exp-add-input{flex:1;background:var(--sur);border:0.5px solid var(--bd2);border-radius:8px;padding:9px 12px;font-size:13px;color:var(--tx);font-family:'DM Sans',sans-serif;outline:none}
.exp-add-input:focus{border-color:var(--ac)}
.exp-add-btn{background:var(--ac);border:none;border-radius:8px;padding:9px 14px;font-size:13px;color:white;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:500}
.exp-empty{font-size:12px;color:var(--tx3);text-align:center;padding:12px 0 4px}






50%{box-shadow:0 4px 42px rgba(255,107,107,0.65)}}

.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:50;align-items:flex-end;justify-content:center;visibility:hidden}
.overlay.open{display:flex;visibility:visible}
.sheet{background:var(--sur);border-radius:24px 24px 0 0;padding:8px 20px 44px;width:100%;max-width:430px;border-top:0.5px solid var(--bd2)}
.handle{width:40px;height:4px;background:var(--bd2);border-radius:2px;margin:10px auto 20px}
.sht{font-size:16px;font-weight:500;margin-bottom:20px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--tx3);margin-bottom:6px;letter-spacing:.04em;text-transform:uppercase}
.field input,.field select{width:100%;background:var(--sur2);border:0.5px solid var(--bd2);border-radius:var(--rs);padding:12px 14px;font-size:15px;color:var(--tx);font-family:'DM Sans',sans-serif;outline:none;-webkit-appearance:none}
.field input:focus,.field select:focus{border-color:var(--ac)}
.shbtns{display:grid;grid-template-columns:1fr 2fr;gap:10px;margin-top:20px}
.bcn{background:var(--sur2);border:0.5px solid var(--bd2);border-radius:var(--rs);padding:14px;font-size:15px;color:var(--tx2);cursor:pointer;font-family:'DM Sans',sans-serif}
.bsv{background:var(--ac);border:none;border-radius:var(--rs);padding:14px;font-size:15px;color:white;cursor:pointer;font-weight:500;font-family:'DM Sans',sans-serif}
.bdl{width:100%;margin-top:10px;background:var(--rd);border:0.5px solid rgba(255,107,107,.2);border-radius:var(--rs);padding:13px;font-size:14px;color:var(--red);cursor:pointer;font-family:'DM Sans',sans-serif}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--sur2);border:0.5px solid var(--bd2);border-radius:100px;padding:10px 20px;font-size:13px;color:var(--tx);z-index:100;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;max-width:90vw}
.toast.show{transform:translateX(-50%) translateY(0)}

/* Sidebar */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:80}
.sidebar-overlay.open{display:block}
.sidebar{position:fixed;top:0;left:0;bottom:0;width:72%;max-width:280px;background:var(--sur);z-index:90;transform:translateX(-100%);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden}
.sidebar.open{transform:translateX(0)}
.sidebar-head{padding:56px 20px 20px;border-bottom:0.5px solid var(--bd)}
.sidebar-logo{font-size:28px;margin-bottom:6px}
.sidebar-title{font-size:18px;font-weight:500;color:var(--tx)}
.sidebar-sub{font-size:12px;color:var(--tx3);margin-top:2px}
.sidebar-nav{flex:1;padding:12px 0;overflow-y:auto}
.sidebar-item{display:flex;align-items:center;gap:14px;padding:14px 20px;cursor:pointer;transition:background .15s;border:none;background:none;width:100%;text-align:left;font-family:'DM Sans',sans-serif}
.sidebar-item:active{background:var(--sur2)}
.sidebar-item.active{background:var(--sur2)}
.sidebar-item-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sidebar-item-text{font-size:14px;font-weight:500;color:var(--tx)}
.sidebar-item-sub{font-size:11px;color:var(--tx3);margin-top:1px}
.sidebar-footer{padding:16px 20px;border-top:0.5px solid var(--bd)}
.sidebar-logout{display:flex;align-items:center;gap:12px;cursor:pointer;background:none;border:none;width:100%;padding:10px 0;font-family:'DM Sans',sans-serif}
.sidebar-logout-text{font-size:13px;color:var(--tx3)}
.menu-btn{width:34px;height:34px;border-radius:50%;border:0.5px solid var(--bd2);background:var(--sur);color:var(--tx2);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* Views */
.view{display:none;flex:1;overflow-y:auto;padding:0 16px 40px}
.view.active{display:block}
.view-title{font-size:20px;font-weight:500;margin:24px 0 20px}

/* Annual summary */
.annual-grid{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.annual-month-card{background:var(--sur);border:0.5px solid var(--bd);border-radius:var(--rs);padding:14px 16px;cursor:pointer}
.annual-month-card.current{border-color:var(--ac)}
.amc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.amc-name{font-size:14px;font-weight:500}
.amc-badge{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500}
.amc-badge.ok{background:rgba(31,204,138,0.15);color:var(--green)}
.amc-badge.warn{background:rgba(245,166,35,0.15);color:var(--am)}
.amc-badge.over{background:rgba(255,107,107,0.15);color:var(--red)}
.amc-badge.empty{background:var(--bd);color:var(--tx3)}
.amc-bars{display:flex;flex-direction:column;gap:5px}
.amc-bar-row{display:flex;align-items:center;gap:8px}
.amc-bar-label{font-size:11px;color:var(--tx3);width:90px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.amc-bar-track{flex:1;height:5px;background:var(--bd);border-radius:3px;overflow:hidden}
.amc-bar-fill{height:5px;border-radius:3px}
.amc-bar-val{font-size:11px;font-family:'DM Mono',monospace;color:var(--tx2);width:60px;text-align:right;flex-shrink:0}

/* Annual totals */
.annual-totals{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.at-card{background:var(--sur);border:0.5px solid var(--bd);border-radius:var(--rs);padding:14px 16px}
.at-label{font-size:11px;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.at-value{font-size:18px;font-weight:500;font-family:'DM Mono',monospace}
.at-value.inc{color:var(--green)}.at-value.exp{color:var(--red)}.at-value.sav{color:var(--ac)}

/* Balance timeline */
.timeline{display:flex;flex-direction:column;gap:8px}
.tl-item{background:var(--sur);border:0.5px solid var(--bd);border-radius:var(--rs);padding:14px 16px;display:flex;align-items:center;gap:12px}
.tl-item.current{border-color:var(--ac)}
.tl-month{font-size:13px;font-weight:500;min-width:60px;color:var(--tx)}
.tl-bars{flex:1}
.tl-bar-wrap{height:6px;background:var(--bd);border-radius:3px;overflow:hidden;margin-bottom:4px;position:relative}
.tl-bar-inc{height:6px;border-radius:3px;background:var(--green);position:absolute;top:0;left:0}
.tl-bar-exp{height:6px;border-radius:3px;background:var(--red);position:absolute;top:0;left:0}
.tl-amounts{display:flex;gap:10px}
.tl-amt{font-size:11px;font-family:'DM Mono',monospace}
.tl-right{text-align:right;flex-shrink:0}
.tl-bal{font-size:14px;font-weight:500;font-family:'DM Mono',monospace}
.tl-bal.pos{color:var(--green)}.tl-bal.neg{color:var(--red)}
.tl-saved{font-size:10px;color:var(--ac);margin-top:2px}
.cumul-card{background:var(--sur);border:0.5px solid var(--bd);border-radius:var(--r);padding:18px;margin-bottom:20px}
.cumul-title{font-size:12px;color:var(--tx3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.cumul-value{font-size:32px;font-weight:300;font-family:'DM Mono',monospace;letter-spacing:-1px}
.cumul-value.pos{color:var(--green)}.cumul-value.neg{color:var(--red)}
.empty-state{text-align:center;padding:40px 20px;color:var(--tx3);font-size:14px}

/* Log view */
.log-table{width:100%;border-collapse:collapse;margin-top:4px}
.log-table thead tr{border-bottom:0.5px solid var(--bd2)}
.log-table th{font-size:10px;font-weight:500;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;padding:8px 6px;text-align:left}
.log-table th:last-child{text-align:right}
.log-table tbody tr{border-bottom:0.5px solid var(--bd)}
.log-table tbody tr:last-child{border-bottom:none}
.log-table tbody tr:active{background:var(--sur2)}
.log-table td{padding:10px 6px;font-size:13px;vertical-align:middle}
.log-date{font-size:11px;color:var(--tx3);white-space:nowrap}
.log-desc{font-weight:500;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px}
.log-cat{font-size:10px;color:var(--tx2);margin-top:2px}
.log-amt{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;text-align:right;white-space:nowrap}
.log-del{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:14px;padding:4px;border-radius:6px}
.log-del:active{color:var(--red);background:var(--rd)}
.log-empty{text-align:center;padding:40px 20px;color:var(--tx3);font-size:14px}
.log-filter{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.log-filter-btn{font-size:12px;padding:5px 12px;border-radius:20px;border:0.5px solid var(--bd2);background:none;color:var(--tx2);cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap}
.log-filter-btn.active{background:var(--ac);border-color:var(--ac);color:white}
.log-total-row{display:flex;justify-content:space-between;align-items:center;padding:12px 6px;border-top:0.5px solid var(--bd2);margin-top:4px}
.log-total-label{font-size:12px;color:var(--tx3)}
.log-total-val{font-size:16px;font-weight:500;font-family:'DM Mono',monospace;color:var(--red)}
</style>
</head>
<body>


<!-- Sidebar overlay -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-head">
    <div class="sidebar-logo">💰</div>
    <div class="sidebar-title">Balance</div>
    <div class="sidebar-sub" id="sidebarUser"></div>
  </div>
  <div class="sidebar-nav">
    <button class="sidebar-item active" id="nav-home" onclick="showView('home')">
      <div class="sidebar-item-icon" style="background:rgba(124,111,255,0.15)">🏠</div>
      <div><div class="sidebar-item-text">Inicio</div><div class="sidebar-item-sub">Mes actual</div></div>
    </button>
    <button class="sidebar-item" id="nav-annual" onclick="showView('annual')">
      <div class="sidebar-item-icon" style="background:rgba(31,204,138,0.15)">📊</div>
      <div><div class="sidebar-item-text">Resumen anual</div><div class="sidebar-item-sub">Gastos por mes</div></div>
    </button>
    <button class="sidebar-item" id="nav-balance" onclick="showView('balance')">

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey:            "__FIREBASE_API_KEY__",
  authDomain:        "__FIREBASE_AUTH_DOMAIN__",
  databaseURL:       "__FIREBASE_DB_URL__",
  projectId:         "__FIREBASE_PROJECT_ID__",
  appId:             "__FIREBASE_APP_ID__"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getDatabase(app);

// Sesión permanente — nunca pide login de nuevo
setPersistence(auth, browserLocalPersistence);

const MO =['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const MO3=['En','Fe','Ma','Ab','My','Jn','Jl','Ag','Se','Oc','No','Di'];
const GOAL_MONTHLY=2000, GOAL_ANNUAL=24000, GOAL_MONTHS=12;
const WARN=800, CRIT=1000;

const RULES=`Reglas aprendidas del usuario:
- "Compras Online": Amazon, Temu, AliExpress, Shein, Zalando, eBay, Pccomponentes, MediaMarkt online, cualquier pedido por internet
- "Suscripciones": Netflix, Spotify, HBO, Disney+, Apple One, iCloud, Google One, Amazon Prime, Filmin, YouTube Premium, cualquier pago recurrente
- "Vivienda": alquiler, hipoteca, comunidad, IBI, seguro hogar
- "Alimentación": Mercadona, Lidl, Carrefour, Dia, Aldi, supermercado, frutería, panadería, compra
- "Transporte": gasolina, Repsol, BP, gasolinera, taxi, Uber, tren, bus, metro, parking, peaje, ITV
- "Salud": farmacia, médico, dentista, óptica, fisio, medicamento
- "Ocio": cine, concierto, teatro, parque
- "Facturas": luz, agua, gas, internet, móvil, teléfono, seguro de coche
- "Restaurantes": restaurante, bar, cafetería, desayuno fuera, cena, menú, terraza
- "Comida": comida para llevar, menú del día, bocadillo, tupper, comida rápida, kebab, hamburguesería
- "Regalo": regalo, presente, detalle, cumpleaños, aniversario, boda, celebración
- "Otros": todo lo que no encaje claramente. Ante la mínima duda, SIEMPRE Otros.`;

let cm=new Date().getMonth(), cy=new Date().getFullYear(), catIdx=null, expandedCat=null;
let S=defS(), fbListener=null;

function defS(){
  return {
    income:{name:'Sueldo neto',amount:0},
    categories:[
      {name:'Vivienda',       icon:'🏠',color:'#4ab8e8',entries:[]},
      {name:'Alimentación',   icon:'🛒',color:'#1fcc8a',entries:[]},
      {name:'Transporte',     icon:'🚗',color:'#7c6fff',entries:[]},
      {name:'Ocio',           icon:'🎬',color:'#e879a0',entries:[]},
      {name:'Facturas',       icon:'💡',color:'#f5a623',entries:[]},
      {name:'Salud',          icon:'💊',color:'#ff6b6b',entries:[]},
      {name:'Restaurantes',   icon:'🍽️',color:'#f5a623',entries:[]},
      {name:'Compras Online', icon:'🛍️',color:'#7c6fff',entries:[]},
      {name:'Suscripciones',  icon:'🔄',color:'#4ab8e8',entries:[]},
      {name:'Comida',           icon:'🥘',color:'#f5a623',entries:[]},
      {name:'Regalo',            icon:'🎁',color:'#e879a0',entries:[]},
      {name:'Otros',          icon:'📦',color:'#888890',entries:[],isOtros:true},
    ]
  };
}

function dbKey(){ return `budget_${cy}_${String(cm).padStart(2,'0')}`; }
function setSyncDot(s){ document.getElementById('syncDot').className='sync-dot '+s; }
function fmt(n){ 
  if(n===undefined||n===null)return '0€';
  const r=Math.round(n*100)/100;
  return r.toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2})+'€'; 
}
function catTotal(c){ return (c.entries||[]).reduce((s,e)=>s+(e.amount||0),0); }
function fmtDate(ts){
  const d=new Date(ts), h=new Date(), y=new Date(h);
  y.setDate(h.getDate()-1);
  if(d.toDateString()===h.toDateString()) return 'Hoy '+d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
  if(d.toDateString()===y.toDateString()) return 'Ayer '+d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
  return d.toLocaleDateString('es-ES',{day:'numeric',month:'short'})+' '+d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
}

// ── AUTH ───────────────────────────────────────────────────────────
onAuthStateChanged(auth, user=>{
  if(user){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('appScreen').className='app-screen visible';
    document.getElementById('sidebarUser').textContent=user.email||'';
    subscribeMonth();
  } else {
    document.getElementById('loginScreen').style.display='flex';
    document.getElementById('appScreen').className='app-screen';
    if(fbListener){ fbListener(); fbListener=null; }
  }
});

window.doLogin=async function(){
  const email=document.getElementById('lEmail').value.trim();
  const pass=document.getElementById('lPass').value;
  const err=document.getElementById('lError');
  err.className='login-error';
  try{
    await signInWithEmailAndPassword(auth,email,pass);
  }catch(e){
    err.textContent='Email o contraseña incorrectos';
    err.className='login-error show';
  }
};

window.doLogout=async function(){
  await signOut(auth);
  toast('Sesión cerrada');
};

// Enter key on login
document.getElementById('lPass').addEventListener('keydown',e=>{ if(e.key==='Enter') window.doLogin(); });

// ── FIREBASE ───────────────────────────────────────────────────────
function subscribeMonth(){
  if(fbListener){ fbListener(); fbListener=null; }
  setSyncDot('syncing');
  fbListener=onValue(ref(db,dbKey()), snap=>{
    S = snap.exists() ? snap.val() : defS();
    fixCats();
    setSyncDot('ok');
    render();
  }, ()=>setSyncDot('error'));
}

async function persist(){
  setSyncDot('syncing');
  try{ await set(ref(db,dbKey()),S); setSyncDot('ok'); }
  catch(e){ setSyncDot('error'); toast('Error al guardar'); }
}

function fixCats(){
  S.categories.forEach(c=>{ if(!c.entries)c.entries=[]; });
  if(!S.categories.some(c=>c.isOtros))
    S.categories.push({name:'Otros',icon:'📦',color:'#888890',entries:[],isOtros:true});
  [{name:'Compras Online',icon:'🛍️',color:'#7c6fff'},
   {name:'Suscripciones', icon:'🔄',color:'#4ab8e8'}].forEach(d=>{
    if(!S.categories.some(c=>c.name===d.name)){
      const oi=S.categories.findIndex(c=>c.isOtros);
      S.categories.splice(oi,0,{...d,entries:[]});
    }
  });
}

// ── ALERT ──────────────────────────────────────────────────────────
function renderAlert(tot){
  const b=document.getElementById('alertBanner');
  const ic=document.getElementById('alertIcon');
  const ti=document.getElementById('alertTitle');
  const su=document.getElementById('alertSub');
  if(tot>=CRIT){
    b.className='alert-banner crit';ic.textContent='🚨';
    ti.textContent=`Límite superado — ${fmt(tot)} gastados`;
    su.textContent=`Habéis pasado los ${fmt(CRIT)} este mes.`;
    if(navigator.vibrate)navigator.vibrate([200,100,200]);
  } else if(tot>=WARN){
    b.className='alert-banner warn';ic.textContent='⚠️';
    ti.textContent=`Atención — ${fmt(tot)} gastados`;
    su.textContent=`Solo quedan ${fmt(CRIT-tot)} hasta el límite de ${fmt(CRIT)}.`;
  } else { b.className='alert-banner'; }
}

// ── RENDER ─────────────────────────────────────────────────────────
function render(){
  document.getElementById('mlbl').textContent=MO[cm]+' '+cy;
  const cats=S.categories||[];
  const tot=cats.reduce((s,c)=>s+catTotal(c),0);
  const rawBal=S.income.amount-tot;
  document.getElementById('sInc').textContent=fmt(S.income.amount);
  document.getElementById('sExp').textContent=fmt(tot);
  renderAlert(tot);
  const bEl=document.getElementById('hbal');
  bEl.textContent=fmt(Math.abs(rawBal));
  bEl.className='hero-bal '+(rawBal>=0?'pos':'neg');
  document.getElementById('hsub').textContent=rawBal>=0
    ?`+${fmt(Math.max(0,rawBal-GOAL_MONTHLY))} tras reservar ${fmt(GOAL_MONTHLY)} de ahorro`
    :'en negativo este mes';
  document.getElementById('iname').textContent=S.income.name;
  document.getElementById('iamt').textContent=fmt(S.income.amount);
  const list=document.getElementById('catList');
  list.innerHTML='';
  const mx=Math.max(...cats.map(c=>catTotal(c)),1);
  const reg=cats.filter(c=>!c.isOtros);
  const ot=cats.find(c=>c.isOtros);
  [...reg,...(ot?[ot]:[])].forEach(c=>{
    const i=cats.indexOf(c);
    const total=catTotal(c);
    const pct=tot>0?Math.round(total/tot*100):0;
    const bw=Math.round(total/mx*100);
    const isExp=expandedCat===i;
    const wrap=document.createElement('div');
    const row=document.createElement('div');
    row.className='cat'+(c.isOtros?' otros':'')+(isExp?' expanded':'');
    row.onclick=()=>toggleCat(i);
    row.innerHTML=`
      <div class="cdot" style="background:${c.color}22">${c.icon||'📦'}</div>
      <div class="cmeta">
        <div class="cname">${c.name}${c.isOtros?'<span class="otbadge">revisar</span>':''}</div>
        <div class="cbar"><div class="cbarfi" style="width:${bw}%;background:${c.color}"></div></div>
      </div>
      <div class="cright">
        <div class="camt" style="color:${c.color}">${fmt(total)}</div>
        <div class="cpct">${pct}% · ${(c.entries||[]).length} gastos</div>
        <div class="cchev${isExp?' open':''}">▼</div>
      </div>`;
    const panel=document.createElement('div');
    panel.className='exp-panel'+(isExp?' open':'');
    const entries=(c.entries||[]).slice().reverse();
    let inner=`<div class="exp-panel-inner">`;
    if(!entries.length){ inner+=`<div class="exp-empty">Sin gastos aún.</div>`; }
    else entries.forEach((e,ei)=>{
      const realIdx=(c.entries.length-1)-ei;
      inner+=`<div class="exp-row">
        <div class="exp-left">
          <div class="exp-desc">${e.desc||'Gasto'}</div>
          <div class="exp-meta"><span>${fmtDate(e.ts)}</span>${e.who?`<span class="exp-who">· ${e.who}</span>`:''}</div>
        </div>
        <div class="exp-right">
          <div class="exp-amt" style="color:${c.color}">${fmt(e.amount)}</div>
          <button class="exp-del" data-cat="${i}" data-entry="${realIdx}">✕</button>
        </div>
      </div>`;
    });
    inner+=`<div class="exp-add-row">
      <input class="exp-add-input" id="qaD_${i}" type="text" placeholder="Descripción">
      <input class="exp-add-input" id="qaA_${i}" type="text" inputmode="decimal" placeholder="0,00" style="width:70px;flex:none">
      <button class="exp-add-btn" data-qi="${i}">+</button>
    </div>
    <div style="padding:6px 0 4px">
      <button data-edit="${i}" style="width:100%;background:none;border:0.5px solid var(--bd2);border-radius:8px;padding:8px;font-size:12px;color:var(--tx2);cursor:pointer;font-family:'DM Sans',sans-serif;">Editar categoría</button>
    </div></div>`;
    panel.innerHTML=inner;
    panel.addEventListener('click',e=>{
      const del=e.target.closest('[data-entry]');
      if(del){delEntry(+del.dataset.cat,+del.dataset.entry,e);return;}
      const qi=e.target.closest('[data-qi]');
      if(qi){quickAdd(+qi.dataset.qi,e);return;}
      const ed=e.target.closest('[data-edit]');
      if(ed){openEditCat(+ed.dataset.edit,e);return;}
    });
    wrap.appendChild(row);wrap.appendChild(panel);list.appendChild(wrap);
  });
  renderMeta();
}

function toggleCat(i){ expandedCat=(expandedCat===i)?null:i; render(); }
function delEntry(ci,ei,e){ e.stopPropagation(); S.categories[ci].entries.splice(ei,1); persist(); toast('🗑 Gasto eliminado'); }
function quickAdd(i,e){
  e.stopPropagation();
  const desc=document.getElementById(`qaD_${i}`).value.trim()||'Gasto';
  const amt=parseFloat(document.getElementById(`qaA_${i}`).value.replace(',','.'))||0;
  if(amt<=0)return;
  addEntry(i,desc,amt,'Tú');
  document.getElementById(`qaD_${i}`).value='';
  document.getElementById(`qaA_${i}`).value='';
}
function addEntry(ci,desc,amount,who){
  if(!S.categories[ci].entries)S.categories[ci].entries=[];
  S.categories[ci].entries.push({desc,amount,who,ts:Date.now()});
  persist();
  if(currentView==='log') renderLog();
}

// ── META ───────────────────────────────────────────────────────────
function mKey(y,m){ return `${y}_${String(m).padStart(2,'0')}`; }
function renderMeta(){
  onValue(ref(db,'savings_goal'), snap=>{
    const sv=snap.exists()?snap.val():{};
    const curKey=mKey(cy,cm);
    const keys=Object.keys(sv).sort();
    let sy=cy,sm=cm;
    if(keys.length>0){const f=keys[0].split('_');sy=parseInt(f[0]);sm=parseInt(f[1]);}
    const months=[];let y=sy,m=sm;
    for(let i=0;i<GOAL_MONTHS;i++){months.push({y,m,key:mKey(y,m)});m++;if(m>11){m=0;y++;}}
    let done=0,totalSaved=0;
    months.forEach(({key})=>{if(sv[key]){done++;totalSaved+=GOAL_MONTHLY;}});
    const pct=Math.round(totalSaved/GOAL_ANNUAL*100);
    document.getElementById('metaAcum').innerHTML=`${fmt(totalSaved)} <span>de ${fmt(GOAL_ANNUAL)}</span>`;
    document.getElementById('metaBar').style.width=pct+'%';
    document.getElementById('metaPct').textContent=pct+'%';
    const badge=document.getElementById('metaBadge');
    badge.textContent=`${done} / ${GOAL_MONTHS}`;
    badge.className='meta-badge'+(done===GOAL_MONTHS?' done':'');
    const saved=!!sv[curKey];
    document.getElementById('metaMes').textContent=saved?fmt(GOAL_MONTHLY):'0€';
    const info=document.getElementById('metaMonthInfo');
    const btn=document.getElementById('metaBtn');
    if(saved){info.innerHTML=`Este mes: <strong style="color:var(--green)">✓ guardado</strong>`;btn.textContent='✓ Guardado';btn.className='meta-saved-btn done';}
    else{info.innerHTML=`Este mes: <strong>pendiente</strong>`;btn.textContent='Marcar guardado';btn.className='meta-saved-btn pending';}
    const dots=document.getElementById('monthDots');dots.innerHTML='';
    months.forEach(({y,m,key})=>{
      const isCur=(y===cy&&m===cm),isPast=(y<cy)||(y===cy&&m<cm);
      const div=document.createElement('div');div.title=MO[m]+' '+y;
      div.className='mstep '+(sv[key]?'done':isCur?'current':isPast?'missed':'future');
      div.textContent=MO3[m];dots.appendChild(div);
    });
  },{onlyOnce:true});
}

window.toggleSaving=async function(){
  const snap=await new Promise(res=>onValue(ref(db,'savings_goal'),res,{onlyOnce:true}));
  const sv=snap.exists()?snap.val():{};
  const key=mKey(cy,cm);
  if(sv[key]){delete sv[key];toast('↩ Mes desmarcado');}
  else{sv[key]=true;toast(`🎯 +${fmt(GOAL_MONTHLY)} guardados`);}
  await set(ref(db,'savings_goal'),sv);
  renderMeta();
};

window.chM=function(d){ cm+=d;if(cm>11){cm=0;cy++;}if(cm<0){cm=11;cy--;}expandedCat=null;subscribeMonth(); };

window.openAdd=function(){
  catIdx=null;document.getElementById('catTitle').textContent='Nueva categoría';
  document.getElementById('cNm').value='';document.getElementById('cIc').value='📦';document.getElementById('cCo').value='#1fcc8a';
  document.getElementById('catDelBtn').style.display='none';document.getElementById('catMod').classList.add('open');
};
window.openEditCat=function(i,e){
  e&&e.stopPropagation();catIdx=i;const c=S.categories[i];
  document.getElementById('catTitle').textContent='Editar categoría';
  document.getElementById('cNm').value=c.name;document.getElementById('cIc').value=c.icon||'📦';document.getElementById('cCo').value=c.color;
  document.getElementById('catDelBtn').style.display=c.isOtros?'none':'block';document.getElementById('catMod').classList.add('open');
};
window.closeCat=function(){document.getElementById('catMod').classList.remove('open');};
window.saveCat=function(){
  const name=document.getElementById('cNm').value.trim();
  const icon=document.getElementById('cIc').value;const color=document.getElementById('cCo').value;
  if(!name)return;
  if(catIdx!==null){S.categories[catIdx]={...S.categories[catIdx],name,icon,color};}
  else{S.categories.push({name,icon,color,entries:[]});}
  persist();closeCat();toast(catIdx!==null?`✓ ${name} actualizada`:`✓ ${name} añadida`);
};
window.delCat=function(){
  if(catIdx===null||S.categories[catIdx].isOtros)return;
  const n=S.categories[catIdx].name;S.categories.splice(catIdx,1);
  if(expandedCat===catIdx)expandedCat=null;persist();closeCat();toast(`🗑 ${n} eliminada`);
};
window.openInc=function(){document.getElementById('iNm').value=S.income.name;document.getElementById('iAm').value=S.income.amount;document.getElementById('iMod').classList.add('open');};
window.closeInc=function(){document.getElementById('iMod').classList.remove('open');};
window.saveInc=function(){
  const name=document.getElementById('iNm').value.trim()||'Sueldo neto';
  const amt=parseFloat(document.getElementById('iAm').value.replace(',','.'))||0;
  S.income={name,amount:amt};persist();closeInc();toast('✓ Entrada actualizada');
};
document.querySelectorAll('.overlay').forEach(el=>el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open');}));
let tT;
window.toast=function(msg){const t=document.getElementById('tst');t.textContent=msg;t.classList.add('show');clearTimeout(tT);tT=setTimeout(()=>t.classList.remove('show'),2600);};

// ── LOG VIEW ───────────────────────────────────────────────────────
let logFilterCat = null;

function renderLog(){
  const cats = S.categories || [];
  // Collect all entries with category info
  let allEntries = [];
  cats.forEach(c=>{
    (c.entries||[]).forEach((e,idx)=>{
      allEntries.push({
        ...e,
        catName: c.name,
        catColor: c.color,
        catIcon: c.icon,
        catIdx: cats.indexOf(c),
        entryIdx: idx
      });
    });
  });

  // Sort by date desc
  allEntries.sort((a,b)=>b.ts-a.ts);

  // Render category filter pills
  const filterEl = document.getElementById('logFilter');
  const catsWithEntries = cats.filter(c=>(c.entries||[]).length>0);
  filterEl.innerHTML = `<button class="log-filter-btn${logFilterCat===null?' active':''}" onclick="setLogFilter(null)">Todos</button>`
    + catsWithEntries.map(c=>`<button class="log-filter-btn${logFilterCat===c.name?' active':''}" onclick="setLogFilter('${c.name}')" style="${logFilterCat===c.name?'':'border-color:'+c.color+';color:'+c.color}">${c.icon} ${c.name}</button>`).join('');

  // Apply filter
  const filtered = logFilterCat ? allEntries.filter(e=>e.catName===logFilterCat) : allEntries;

  // Render table
  const tbody = document.getElementById('logTableBody');
  if(filtered.length===0){
    tbody.innerHTML = `<tr><td colspan="4" class="log-empty">Sin registros este mes</td></tr>`;
    document.getElementById('logTotalVal').textContent = '0,00€';
    return;
  }

  tbody.innerHTML = filtered.map(e=>`
    <tr>
      <td>
        <div class="log-date">${fmtDateShort(e.ts)}</div>
        <div style="font-size:10px;color:var(--tx3);margin-top:1px">${e.who||''}</div>
      </td>
      <td>
        <div class="log-desc">${e.desc||'Gasto'}</div>
        <div class="log-cat" style="color:${e.catColor}">${e.catIcon} ${e.catName}</div>
      </td>
      <td class="log-amt" style="color:${e.catColor}">${fmt(e.amount)}</td>
      <td><button class="log-del" onclick="delLogEntry(${e.catIdx},${e.entryIdx})" title="Eliminar">✕</button></td>
    </tr>`).join('');

  // Total
  const total = filtered.reduce((s,e)=>s+(e.amount||0),0);
  document.getElementById('logTotalVal').textContent = fmt(total);
}

function fmtDateShort(ts){
  const d = new Date(ts);
  const hoy = new Date();
  const ayer = new Date(hoy); ayer.setDate(hoy.getDate()-1);
  if(d.toDateString()===hoy.toDateString()) return 'Hoy '+d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
  if(d.toDateString()===ayer.toDateString()) return 'Ayer '+d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
  return d.toLocaleDateString('es-ES',{day:'numeric',month:'short',year:'2-digit'})+' '+d.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
}

window.setLogFilter = function(cat){
  logFilterCat = cat;
  renderLog();
};

window.delLogEntry = function(ci, ei){
  S.categories[ci].entries.splice(ei,1);
  persist();
  toast('🗑 Registro eliminado');
  renderLog();
  // Also refresh home if needed
};


</script>
<script>
// Force clear old service worker caches
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(regs=>{
    regs.forEach(r=>r.unregister());
  });
  caches.keys().then(keys=>keys.forEach(k=>caches.delete(k)));
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js?v=10').catch(()=>{});
  });
}
</script>
